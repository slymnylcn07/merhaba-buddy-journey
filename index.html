<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexiKnee</title>
    <meta name="author" content="FlexiKnee" />
    
    <!-- Preconnect to external origins for faster resource loading -->
    <link rel="preconnect" href="https://lovable-project-y7ubq.myshopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://lovable-project-y7ubq.myshopify.com" />
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://ipapi.co" crossorigin />
    <link rel="dns-prefetch" href="https://ipapi.co" />
    
    <!-- Google Analytics 4 - deferred until first user interaction to reduce unused JS -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function(){
        var loaded = false;
        function loadGA() {
          if (loaded) return;
          loaded = true;
          var gs = document.createElement('script');
          gs.async = true;
          gs.src = 'https://www.googletagmanager.com/gtag/js?id=G-5QC0R5G1JG';
          document.head.appendChild(gs);
          gtag('js', new Date());
          gtag('config', 'G-5QC0R5G1JG');
        }
        ['scroll','click','touchstart','keydown'].forEach(function(e){
          window.addEventListener(e, loadGA, {once:true,passive:true});
        });
        // Fallback: load after 8s if no interaction
        window.addEventListener('load', function(){ setTimeout(loadGA, 8000); });
      })();
    </script>
    
    <!-- Preload hero banner images for faster LCP -->
    <link rel="preload" as="image" href="/images/hero-banner-desktop.webp" type="image/webp" media="(min-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/hero-banner-mobile.webp" type="image/webp" media="(max-width: 767px)" fetchpriority="high" />
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/favicon-32.png" />
    
    <!-- Critical inline styles for FCP: paint static hero before CSS bundle loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;padding:0;background:#fff;color:#0b1320;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
      .static-hero{display:block;width:100%;overflow:hidden}
      .static-hero img{display:block;width:100%;height:auto;object-fit:cover}
      #root{min-height:100vh}
    </style>
</head>

  <body>
    <!-- Static hero rendered before React boots for fast LCP -->
    <div class="static-hero" id="static-hero">
      <picture>
        <source media="(min-width: 768px)" srcset="/images/hero-banner-desktop.webp" type="image/webp" />
        <source media="(max-width: 767px)" srcset="/images/hero-banner-mobile.webp" type="image/webp" />
        <img src="/images/hero-banner-mobile.webp" alt="FlexiKnee Smart Heated Knee Massager" width="450" height="675" fetchpriority="high" decoding="sync" />
      </picture>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Shopify Inbox Chat Widget - deferred to improve LCP -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s1 = document.createElement('script');
          s1.src = 'https://cdn.shopify.com/shopifycloud/shop_chat/storefront/shopifyChatV1.js';
          s1.async = true;
          document.body.appendChild(s1);
        }, 3000);
      });
    </script>
  </body>
</html>
