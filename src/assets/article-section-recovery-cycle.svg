  <text x="259" y="662" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#14B8A6">Rest &amp; Hydrate</text>

  <!-- Node 5: Light Movement Next Day (top-left) -->
  <circle cx="171" cy="327" r="48" fill="#8B5CF6"/>
  <g fill="#FFFFFF">
    <path d="M152,340 C160,340 166,344 170,350 L182,350 C186,350 190,354 190,358 C190,362 186,366 182,366 L152,366 C146,366 140,360 140,354 C140,347 146,340 152,340 Z"/>
