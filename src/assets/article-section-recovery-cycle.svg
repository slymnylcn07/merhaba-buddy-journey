<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Outer ring -->
  <circle cx="400" cy="400" r="240" stroke="#D1D5DB" stroke-width="3" fill="none"/>

  <!-- Arrows on ring (clockwise) -->
  <polygon points="400,158 408,170 392,170" fill="#9CA3AF"/>
  <polygon points="628,330 620,342 632,342" fill="#9CA3AF"/>
  <polygon points="560,620 548,618 556,632" fill="#9CA3AF"/>
  <polygon points="240,620 252,618 244,632" fill="#9CA3AF"/>
  <polygon points="172,330 180,342 168,342" fill="#9CA3AF"/>

  <!-- Node 1: Cool Down (top) -->
  <circle cx="400" cy="160" r="48" fill="#2563EB"/>
  <g fill="#FFFFFF">
    <circle cx="400" cy="145" r="5"/>
    <line x1="400" y1="150" x2="400" y2="168" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="400" y1="158" x2="390" y2="166" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="400" y1="158" x2="410" y2="166" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="400" y1="168" x2="392" y2="178" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="400" y1="168" x2="408" y2="178" stroke="#FFFFFF" stroke-width="3"/>
  </g>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#2563EB">Cool Down</text>

  <!-- Node 2: Apply Warmth (top-right) -->
  <circle cx="629" cy="327" r="48" fill="#F59E0B"/>
  <g stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M617,314 C613,324 623,332 619,342"/>
    <path d="M629,310 C625,322 635,330 631,342"/>
    <path d="M641,314 C637,324 647,332 643,342"/>
  </g>
  <text x="629" y="396" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F59E0B">Apply Warmth</text>

  <!-- Node 3: Gentle Stretching (bottom-right) -->
  <circle cx="541" cy="594" r="48" fill="#10B981"/>
  <g fill="#FFFFFF">
    <circle cx="541" cy="578" r="5"/>
    <line x1="541" y1="583" x2="527" y2="598" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="527" y1="598" x2="518" y2="598" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="527" y1="598" x2="541" y2="610" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="541" y1="583" x2="555" y2="590" stroke="#FFFFFF" stroke-width="3"/>
  </g>
  <text x="541" y="662" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#10B981">Gentle Stretching</text>

  <!-- Node 4: Rest & Hydrate (bottom-left) -->
  <circle cx="259" cy="594" r="48" fill="#14B8A6"/>
  <g fill="#FFFFFF">
    <path d="M247,580 C238,595 239,606 247,612 C255,606 256,595 247,580 Z"/>
    <rect x="260" y="583" width="14" height="28" rx="3"/>
