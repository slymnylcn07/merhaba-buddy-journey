  </g>
  <text x="171" y="396" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#8B5CF6">Light Movement</text>
  <text x="171" y="414" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#8B5CF6">Next Day</text>

  <!-- Center title -->
  <text x="400" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#111827">Post-Exercise</text>
  <text x="400" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#111827">Knee Recovery Cycle</text>
</svg>