<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" fill="#FFFFFF"/>

  <!-- Ring -->
  <circle cx="600" cy="600" r="360" stroke="#E5E7EB" stroke-width="28" fill="none"/>

  <!-- Direction arrows on ring -->
  <g fill="#9CA3AF" transform="translate(600 600)">
    <polygon points="215,-289 242,-279 220,-258" transform="rotate(0)"/>
    <polygon points="289,94 315,103 293,124" transform="rotate(0)"/>
    <polygon points="0,344 26,353 4,374" transform="rotate(0)"/>
    <polygon points="-289,94 -263,103 -285,124" transform="rotate(0)"/>
    <polygon points="-215,-289 -189,-279 -211,-258" transform="rotate(0)"/>
  </g>

  <!-- Step nodes (perfectly symmetric) -->
  <circle cx="600" cy="240" r="96" fill="#2563EB"/>
  <circle cx="942" cy="489" r="96" fill="#F59E0B"/>
  <circle cx="812" cy="891" r="96" fill="#10B981"/>
  <circle cx="388" cy="891" r="96" fill="#14B8A6"/>
  <circle cx="258" cy="489" r="96" fill="#8B5CF6"/>

  <!-- Center title -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="800" fill="#111827">Post-Exercise</text>
  <text x="600" y="640" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="800" fill="#111827">Knee Recovery Cycle</text>

  <!-- Icons -->
  <!-- 1. Cool Down (walk icon) -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="600" cy="198" r="10"/>
    <path d="M600 208 L600 235"/>
    <path d="M600 216 L584 228"/>
    <path d="M600 216 L617 226"/>
    <path d="M600 235 L586 253"/>
    <path d="M600 235 L618 256"/>
  </g>

  <!-- 2. Apply Warmth (heat waves) -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M918 190 C910 205 926 218 918 234"/>
    <path d="M942 184 C934 201 950 216 942 234"/>
    <path d="M966 190 C958 205 974 218 966 234"/>
  </g>

  <!-- 3. Gentle Stretching (stretch icon) -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="812" cy="846" r="10"/>
    <path d="M812 856 L790 876"/>
    <path d="M790 876 L774 876"/>
    <path d="M790 876 L812 894"/>
    <path d="M812 856 L832 866"/>
  </g>

  <!-- 4. Rest & Hydrate (drop + glass) -->
  <g fill="#FFFFFF">
    <path d="M364 842 C350 862 351 878 364 888 C377 878 378 862 364 842 Z"/>
    <rect x="395" y="844" width="20" height="42" rx="4"/>
    <rect x="400" y="837" width="10" height="7" rx="2"/>
  </g>

  <!-- 5. Light Movement Next Day (shoe icon) -->
  <g fill="#FFFFFF">
    <path d="M224 857 C236 857 246 862 252 872 L272 872 C279 872 284 878 284 884 C284 890 279 895 272 895 L224 895 C214 895 206 887 206 876 C206 866 214 857 224 857 Z"/>
    <rect x="232" y="847" width="12" height="10" rx="2"/>
  </g>

  <!-- Labels -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    <text x="600" y="292">Cool Down</text>

    <text x="942" y="540">Apply Warmth</text>

    <text x="812" y="942">Gentle Stretching</text>

    <text x="388" y="942">Rest &amp; Hydrate</text>

    <text x="258" y="534">Light Movement</text>
    <text x="258" y="562">Next Day</text>
  </g>
</svg>
